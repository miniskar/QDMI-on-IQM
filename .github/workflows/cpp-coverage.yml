name: 🇨 • Coverage
on:
  workflow_call:
    inputs:
      iqm-qc-alias:
        description: >
          The alias of the IQM quantum computer to use for testing. Defaults to 'emerald:mock'.
          This can be any valid IQM quantum computer alias.
        default: "emerald:mock"
        type: string
    secrets:
      IQM_TOKEN:
        required: true

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}-cpp-coverage
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  coverage:
    name: 📈 Coverage
    runs-on: ubuntu-24.04
    permissions:
      contents: read # Required for the `actions/checkout` action
      id-token: write # Required for the `codecov/codecov-action` action
    env:
      CMAKE_BUILD_PARALLEL_LEVEL: 4
      CTEST_PARALLEL_LEVEL: 4
      FORCE_COLOR: 3
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: recursive
          fetch-depth: 0
          persist-credentials: false

      # set up ccache for faster builds
      - name: Set up ccache
        uses: Chocobo1/setup-ccache-action@7e813cbdf161f77737576f5c370b2810dbae058c # v1.5.7
        with:
          prepend_symlinks_to_path: false
          override_cache_key: c++-coverage

      - name: Set up mold as linker
        uses: rui314/setup-mold@9c9c13bf4c3f1adef0cc596abc155580bcb04444 # v1

      - name: Install the latest version of uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          python-version: 3.13
          activate-environment: true
          enable-cache: true
          save-cache: ${{ github.ref == 'refs/heads/main' }}

      - name: Install Ninja
        run: uv tool install ninja

      # Install build dependencies
      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev

      - name: Configure CMake
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Debug -DENABLE_COVERAGE=ON

      - name: Build
        run: cmake --build build --config Debug

      - name: Test
        env:
          IQM_BASE_URL: "https://resonance.iqm.tech"
          IQM_QC_ALIAS: ${{ inputs.iqm-qc-alias }}
          IQM_TOKEN: ${{ secrets.IQM_TOKEN }}
          IQM_CPP_API_LOG_LEVEL: "DEBUG"
        run: ctest -C Debug --output-on-failure --test-dir build --timeout 600 --repeat until-pass:3

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@e79a6962e0d4c0c17b229090214935d2e33f8354 # v6.0.1
        with:
          fail_ci_if_error: true
          flags: cpp
          use_oidc: true
