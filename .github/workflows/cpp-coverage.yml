name: 🇨 • Coverage
on:
  workflow_call:
    inputs:
      iqm-qc-alias:
        description: >
          The alias of the IQM quantum computer to use for testing. Defaults to 'emerald:mock'.
          This can be any valid IQM quantum computer alias.
        default: "emerald:mock"
        type: string
    secrets:
      IQM_TOKEN:
        required: true

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}-cpp-coverage
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  coverage:
    name: 📈 Coverage
    runs-on: ubuntu-24.04
    permissions:
      contents: read # Required for the `actions/checkout` action
      id-token: write # Required for the `codecov/codecov-action` action
    env:
      CMAKE_BUILD_PARALLEL_LEVEL: 4
      CTEST_PARALLEL_LEVEL: 4
      FORCE_COLOR: 3
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: recursive
          fetch-depth: 0
          persist-credentials: false

      # set up ccache for faster builds
      - name: Set up ccache
        uses: Chocobo1/setup-ccache-action@802ec72ba1d54bbf75c52f45367253d6abec30f5 # v1.5.8
        with:
          prepend_symlinks_to_path: false
          override_cache_key: c++-coverage

      - name: Set up mold as linker
        uses: rui314/setup-mold@9c9c13bf4c3f1adef0cc596abc155580bcb04444 # v1

      - name: Install the latest version of uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          python-version: 3.13
          activate-environment: true
          enable-cache: true
          save-cache: ${{ github.ref == 'refs/heads/main' }}

      - name: Install Ninja
        run: uv tool install ninja

      # Install build dependencies
      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev

      - name: Configure CMake
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Debug -DENABLE_COVERAGE=ON

      - name: Build
        run: cmake --build build --config Debug

      - name: Test
        env:
          IQM_BASE_URL: "https://resonance.iqm.tech"
          IQM_QC_ALIAS: ${{ inputs.iqm-qc-alias }}
          IQM_TOKEN: ${{ secrets.IQM_TOKEN }}
          IQM_CPP_API_LOG_LEVEL: "DEBUG"
        run: ctest -C Debug --output-on-failure --test-dir build --timeout 600 --repeat until-pass:3

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          fail_ci_if_error: true
          flags: cpp
          use_oidc: true
